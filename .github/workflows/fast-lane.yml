# M3Lib Fast Lane — triggered on every push
# Build + tests + ASan/UBSan on self-hosted runner
#
# contract-tests job uses --cxflags override for observe mode.
# GCC picks the last -fcontract-evaluation-semantic flag (observe > enforce).
# continue-on-error due to GCC 16.1.0 ICE.
#
# M3Lib 快车道 — 每次 push 触发
# 在自托管 runner 上执行编译 + 测试 + 内存/未定义行为检查
#
# contract-tests job 使用 --cxflags 覆盖实现 observe 模式。
# GCC 取最后一个 -fcontract-evaluation-semantic 标志（observe > enforce）。
# 因 GCC 16.1.0 ICE 使用 continue-on-error。

name: Fast Lane

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  enforce-tests:
    name: Enforce-Mode Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log toolchain version
        run: |
          mkdir -p artifacts
          gcc --version | tee artifacts/gcc-version.txt

      - name: Build all tests
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake f -c -m debug -y
          xmake build tests

      - name: Run tests
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake run test_vec
          xmake run test_math
          xmake run test_cxx26
          xmake run test_mat

  contract-tests:
    name: Contract Tests (observe)
    runs-on: self-hosted
    timeout-minutes: 10
    continue-on-error: true  # GCC 16.1.0 ICE — tracked in repo issue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Run test_contracts
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake f -c -m debug --cxflags="-fcontract-evaluation-semantic=observe" -y
          xmake build test_contracts
          xmake run test_contracts 2>contract_violations.log
          VIOLATIONS=$(grep -c "contract violation" contract_violations.log || true)
          echo "Contract violations detected: $VIOLATIONS"
          if [ "$VIOLATIONS" -lt 3 ]; then
            echo "ERROR: fewer than 3 contract violations, contracts may be inactive"
            exit 1
          fi

  release-tests:
    name: Release-Mode Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build all tests (release)
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake f -c -m release --march=generic -y
          xmake build tests

      - name: Run tests (release)
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake run test_vec
          xmake run test_math
          xmake run test_cxx26
          xmake run test_mat

  mcpp-verify:
    name: mcpp Build Check
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: mcpp build

      - name: Run tests
        run: |
          find target -name test_vec -exec {} \;
          find target -name test_math -exec {} \;
          find target -name test_cxx26 -exec {} \;
          find target -name test_mat -exec {} \;

  asan-ubsan:
    name: ASan + UBSan
    runs-on: self-hosted
    timeout-minutes: 15
    continue-on-error: true  # GCC 16.1.0 ICE may affect test_contracts under ASan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with sanitizers
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          export LD_LIBRARY_PATH=$HOME/.xlings/data/runtimedir/gcc-16.1.0-linux-x86_64/lib64:$LD_LIBRARY_PATH
          xmake f -c -m debug \
            --cxflags="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            --ldflags="-fsanitize=address,undefined" -y
          xmake build tests

      - name: Run with sanitizers
        run: |
          export LD_LIBRARY_PATH=$HOME/.xlings/data/runtimedir/gcc-16.1.0-linux-x86_64/lib64:$LD_LIBRARY_PATH
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_vec
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_math
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_cxx26
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_mat
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_contracts
