# M3Lib Fast Lane — triggered on every push
# Build + tests + ASan/UBSan on self-hosted runner
#
# M3Lib 快车道 — 每次 push 触发
# 在自托管 runner 上执行编译 + 测试 + 内存/未定义行为检查

name: Fast Lane

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  core-tests:
    name: Build & Core Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure xmake (debug)
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake f -c -m debug -y

      - name: Build & Run test_vec
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake build test_vec
          xmake run test_vec

      - name: Build & Run test_math
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake build test_math
          xmake run test_math

  feature-tests:
    name: Feature Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure xmake (debug)
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake f -c -m debug -y

      - name: Build & Run test_cxx26
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake build test_cxx26
          xmake run test_cxx26

  boundary-tests:
    name: Boundary Tests (enforce)
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Run test_boundary
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake f -c -m debug -y
          xmake build test_boundary
          xmake run test_boundary

  contract-tests:
    name: Contract Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Run test_contracts (observe mode)
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake clean
          rm -rf build/.gens build/.objs build/linux/x64/debug/*.gcm
          xmake f -c -m debug -y
          xmake build test_contracts
          xmake run test_contracts 2>contract_violations.log
          VIOLATIONS=$(grep -c "contract violation" contract_violations.log || true)
          echo "Contract violations detected: $VIOLATIONS"
          if [ "$VIOLATIONS" -lt 3 ]; then
            echo "ERROR: fewer than 3 contract violations, contracts may be inactive"
            exit 1
          fi

      - name: Compile-fail test (=delete with reason)
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          # test_delete_reason.cpp must FAIL to compile with the expected
          # message from =delete("reason") (P2573R2).
          #
          # test_delete_reason.cpp 必须编译失败，并输出
          # =delete("reason") (P2573R2) 的预期消息。
          ! gcc -std=c++26 -c tests/test_delete_reason.cpp 2>&1 \
            | grep -q "cannot construct.*different dimension" \
            && echo "PASS: =delete(reason) works" \
            || { echo "FAIL: =delete(reason) compile error missing"; exit 1; }

  asan-ubsan:
    name: ASan + UBSan
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean module cache
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          xmake clean
          rm -rf build/.gens build/.objs build/linux/x64/debug/*.gcm

      - name: Configure with sanitizers
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          export LD_LIBRARY_PATH=$HOME/.xlings/data/runtimedir/gcc-16.1.0-linux-x86_64/lib64:$LD_LIBRARY_PATH
          xmake f -c -m debug \
            --cxflags="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            --ldflags="-fsanitize=address,undefined" \
            -y

      - name: Build & Run test_vec with ASan+UBSan
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          export LD_LIBRARY_PATH=$HOME/.xlings/data/runtimedir/gcc-16.1.0-linux-x86_64/lib64:$LD_LIBRARY_PATH
          xmake build test_vec
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_vec

      - name: Build & Run test_math with ASan+UBSan
        run: |
          export PATH=$HOME/.xlings/subos/current/bin:$PATH
          export LD_LIBRARY_PATH=$HOME/.xlings/data/runtimedir/gcc-16.1.0-linux-x86_64/lib64:$LD_LIBRARY_PATH
          xmake build test_math
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 xmake run test_math
