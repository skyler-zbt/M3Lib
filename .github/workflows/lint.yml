# M3Lib Lint — runs on every push/PR
# Lightweight checks on GitHub-hosted runner (free, always available)
#
# M3Lib 代码检查 — 每次 push/PR 触发
# 在 GitHub 虚拟机上运行轻量检查（免费，始终可用）

name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-22

      - name: Check formatting
        run: |
          find . -name '*.cppm' -o -name '*.cpp' -o -name '*.h' \
            | grep -v '.git/' \
            | xargs clang-format-22 --dry-run --Werror
