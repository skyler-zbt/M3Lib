# M3Lib Lint — runs on every push/PR
# Lightweight checks on GitHub-hosted runner (free, always available)
#
# M3Lib 代码检查 — 每次 push/PR 触发
# 在 GitHub 虚拟机上运行轻量检查（免费，始终可用）

name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format

      - name: Check formatting
        run: |
          find . -name '*.cppm' -o -name '*.cpp' -o -name '*.h' \
            | grep -v '.git/' \
            | xargs clang-format --dry-run --Werror
