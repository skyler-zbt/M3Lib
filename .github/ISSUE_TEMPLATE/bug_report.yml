name: Bug Report
description: File a bug report to help us improve M3Lib.
title: "[Bug] <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal code example or steps to trigger the bug.
        If possible, provide a self-contained snippet that compiles.
      render: cpp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages, compiler output, stack traces.
      render: text
    validations:
      required: true

  - type: input
    id: gcc_version
    attributes:
      label: GCC version
      description: Output of `g++ --version`
      placeholder: "g++ (GCC) 16.1.1 20250514 (Red Hat 16.1.1-2)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: Distribution and version (e.g. Fedora 44, Ubuntu 26.04)
      placeholder: "Fedora 44"
    validations:
      required: true

  - type: input
    id: xmake_version
    attributes:
      label: xmake version
      description: Output of `xmake --version`
      placeholder: "xmake v3.0.8"

  - type: dropdown
    id: build_mode
    attributes:
      label: Build mode
      options:
        - debug
        - release
        - release --march=native

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using GCC 16 or newer
          required: true
        - label: I am building on Linux x64
          required: true
