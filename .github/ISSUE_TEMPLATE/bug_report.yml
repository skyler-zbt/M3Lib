name: Bug Report
description: >
  File a bug report to help us improve M3Lib.

  提交缺陷报告以帮助改进 M3Lib。
title: "[Bug] <简短描述>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

        感谢你花时间报告缺陷！请填写以下内容。

  - type: textarea
    id: description
    attributes:
      label: Describe the bug / 描述缺陷
      description: >
        A clear and concise description of what the bug is.

        清晰简洁地描述缺陷是什么。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce / 复现步骤
      description: |
        Minimal code example or steps to trigger the bug.
        If possible, provide a self-contained snippet that compiles.

        最小代码示例或触发缺陷的步骤。如可能，提供可编译的自包含代码片段。
      render: cpp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour / 预期行为
      description: >
        What did you expect to happen?

        你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour / 实际行为
      description: >
        What actually happened? Include error messages, compiler output, stack traces.

        实际发生了什么？请包含错误消息、编译器输出、堆栈跟踪。
      render: text
    validations:
      required: true

  - type: input
    id: gcc_version
    attributes:
      label: GCC version / GCC 版本
      description: >
        Output of `g++ --version`.

        `g++ --version` 的输出。
      placeholder: "g++ (GCC) 16.1.1 20250514 (Red Hat 16.1.1-2)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system / 操作系统
      description: >
        Distribution and version (e.g. Fedora 44, Ubuntu 26.04).

        发行版及版本。
      placeholder: "Fedora 44"
    validations:
      required: true

  - type: input
    id: xmake_version
    attributes:
      label: xmake version / xmake 版本
      description: >
        Output of `xmake --version`.

        `xmake --version` 的输出。
      placeholder: "xmake v3.0.9"

  - type: dropdown
    id: build_mode
    attributes:
      label: Build mode / 构建模式
      options:
        - debug
        - release
        - release --march=native

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks / 提交前检查
      options:
        - label: >
            I have searched existing issues to avoid duplicates.

            我已搜索现有 issue 以避免重复。
          required: true
        - label: >
            I am using GCC 16 or newer.

            我使用 GCC 16 或更新版本。
          required: true
        - label: >
            I am building on Linux x64.

            我在 Linux x64 上构建。
          required: true
