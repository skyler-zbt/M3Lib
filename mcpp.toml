# M3Lib: Modern · Module · Math
# mcpp build config — https://github.com/mcpp-community/mcpp/blob/main/docs/05-mcpp-toml.md

[package]
name        = "M3Lib"
version     = "0.1.0"
standard    = "c++26"
description = "A modern C++ graphics math library"
license     = "Apache-2.0"
authors     = "Skyler"
repo        = "https://github.com/skyler-zbt/M3Lib"

[targets.M3Lib]
kind = "lib"

[targets.test_vec]
kind = "bin"
main = "tests/test_vec.cpp"

[targets.test_math]
kind = "bin"
main = "tests/test_math.cpp"

[targets.test_cxx26]
kind = "bin"
main = "tests/test_cxx26.cpp"

[targets.test_boundary]
kind = "bin"
main = "tests/test_boundary.cpp"

[targets.test_contracts]
kind = "bin"
main = "tests/test_contracts.cpp"
cxxflags = ["-fcontract-evaluation-semantic=observe"]

[lib]
path = "m3/m3.cppm"

[build]
sources = ["m3/**/*.cppm"]
cxxflags = ["-fcontracts", "-fcontract-evaluation-semantic=enforce", "-march=native"]

[toolchain]
default = "gcc@16.1.0"
