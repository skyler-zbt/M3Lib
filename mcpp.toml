# M3Lib: Modern · Module · Math
# mcpp build config — https://github.com/mcpp-community/mcpp/blob/main/docs/05-mcpp-toml.md
#
#    mcpp build              build library
#    mcpp build -p <target>  build a specific target
#    mcpp run <target>       run a binary target
#
# NOTE: mcpp v0.0.30 does not propagate project cxxflags (-fcontracts)
# to the std module compilation step.  Contracts-enabled projects currently
# require xmake as the primary build system.
# See: https://github.com/mcpp-community/mcpp

[package]
name        = "M3Lib"
version     = "0.1.0"
description = "A modern C++ graphics math library"
license     = "Apache-2.0"
authors     = "Skyler"
repo        = "https://github.com/skyler-zbt/M3Lib"

[targets.M3Lib]
kind = "lib"

[targets.test_vec]
kind = "bin"
main = "tests/test_vec.cpp"

[targets.test_math]
kind = "bin"
main = "tests/test_math.cpp"

[targets.test_cxx26]
kind = "bin"
main = "tests/test_cxx26.cpp"

[targets.test_contracts]
kind = "bin"
main = "tests/test_contracts.cpp"
cxxflags = ["-fcontract-evaluation-semantic=observe"]

[lib]
path = "m3/m3.cppm"

[build]
sources = ["m3/**/*.cppm"]
cxxflags = ["-std=c++26", "-fcontracts"]

[toolchain]
default = "gcc@16.1.0"
